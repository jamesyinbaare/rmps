<style>
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    min-height: 96px;
    padding: 6px 0 8px 0;
  }

  .master-header-table {
    width: 100%;
    border-collapse: collapse;
    border: none;
  }

  .master-header-table td {
    border: none;
    vertical-align: middle;
    padding: 4px 8px;
  }

  .master-header-logo {
    width: 88px;
    padding-right: 10px;
    padding-left: 2px;
  }

  .master-header-logo img {
    width: 72px;
    height: auto;
    max-height: 72px;
    display: block;
    object-fit: contain;
  }

  .master-header-center {
    text-align: center;
    padding-left: 12px;
    padding-right: 12px;
  }

  .master-header-center .centre-headline {
    margin: 0 0 6px 0;
    font-weight: bold;
    font-size: 11pt;
    line-height: 1.25;
    color: #000;
  }

  .master-header-center .doc-subtitle {
    margin: 0 0 4px 0;
    font-weight: bold;
    font-size: 8.5pt;
    line-height: 1.2;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #222;
  }

  .master-header-center .subject-line {
    margin: 0 0 6px 0;
    font-weight: bold;
    font-size: 10pt;
    line-height: 1.2;
    color: #000;
  }

  .master-header-center .meta-strip {
    margin: 0;
    font-weight: normal;
    font-size: 7.5pt;
    line-height: 1.35;
    color: #333;
    text-align: center;
  }

  .master-header-center .meta-strip .meta-exam-count {
    display: block;
  }
</style>

<header>
  <table class="master-header-table">
    <tr>
      <td class="master-header-logo">
        <img src="logo-crest-only.png" alt="" />
      </td>
      <td class="master-header-center">
        <p class="centre-headline">{{ (center[:72] + "…") if center|length > 75 else center }}</p>
        <p class="doc-subtitle">Master plan — distribution of questions</p>
        <p class="subject-line">{{ subject }}</p>
        <p class="meta-strip">
          <span class="meta-exam-count">Exam: {{ exam_year }} {{ exam_series }} {{ exam_type }} · {{ candidate_count }} candidate{% if candidate_count != 1 %}s{% endif %}</span>
        </p>
      </td>
    </tr>
  </table>
</header>
