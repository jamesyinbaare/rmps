# File-provider routes for exam-tools (avoids duplicate routers vs compose labels).
# Update Host() values to your real domains before going live.
http:
  routers:
    monitoring-frontend-staging:
      rule: "Host(`monitoring.jamesyin.com`)"
      entryPoints:
        - websecure
      service: monitoring-frontend-staging
      tls:
        certResolver: letsencrypt
      middlewares:
        - monitoring-security-headers

    monitoring-frontend-staging-http:
      rule: "Host(`monitoring.jamesyin.com`)"
      entryPoints:
        - web
      service: monitoring-frontend-staging
      middlewares:
        - monitoring-security-headers

    monitoring-backend-staging:
      rule: "Host(`monitoring-api.jamesyin.com`)"
      entryPoints:
        - websecure
      service: monitoring-backend-staging
      tls:
        certResolver: letsencrypt
      middlewares:
        - monitoring-security-headers

    monitoring-backend-staging-http:
      rule: "Host(`monitoring-api.jamesyin.com`)"
      entryPoints:
        - web
      service: monitoring-backend-staging
      middlewares:
        - monitoring-security-headers

  services:
    monitoring-frontend-staging:
      loadBalancer:
        servers:
          - url: "http://monitoring-tools-frontend-staging:3001"

    monitoring-backend-staging:
      loadBalancer:
        servers:
          - url: "http://monitoring-tools-backend-staging:80"

  middlewares:
    monitoring-security-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        contentSecurityPolicy: "upgrade-insecure-requests; block-all-mixed-content"
        customResponseHeaders:
          Content-Security-Policy: "upgrade-insecure-requests; block-all-mixed-content"

tls:
  options:
    default:
      minVersion: "VersionTLS12"
